[workspace]
name = "gsplat-rerun-minimal"
channels = ["conda-forge"]
platforms = ["linux-64", "osx-arm64"]

[tasks.viewer]
cmd = "cargo run --release"
description = "Launch the stock Rerun viewer extended with the Gaussian splat visualizer."

[tasks.fmt]
cmd = "cargo fmt --all"
description = "Format the Rust code."

[tasks.clippy]
cmd = "cargo clippy --all-targets -- -D warnings"
description = "Run clippy and fail on warnings."

[tasks.test]
cmd = "cargo test"
description = "Run the Rust test suite."

[dependencies]
clang = "*"
cmake = "*"
numpy = "*"
pkg-config = "*"
python = "3.12.*"
rust = "1.93.*"

[pypi-dependencies]
plyfile = ">=1.1,<2"
rerun-sdk = "==0.30.0"

[feature.dev.dependencies]
beartype = ">=0.20"
pyrefly = ">=0.34.0,<0.35"

[environments]
dev = { features = ["dev"], solve-group = "default" }

[target.linux-64.dependencies]
libxkbcommon = "*"
wayland = "*"
xorg-libx11 = "*"
xorg-libxcursor = "*"
xorg-libxi = "*"
xorg-libxinerama = "*"
xorg-libxrandr = "*"
